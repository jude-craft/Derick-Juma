<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Derick Juma - Mobile App Developer specializing in Flutter & Kotlin">
    <meta name="author" content="Derick Juma">
    <title>Derick Juma | Mobile App Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-text">DJ</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#skills" class="nav-link">Skills</a></li>
                <li><a href="#projects" class="nav-link">Projects</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-container">
            <div class="hero-content">
                <div class="hero-text">
                    <!-- Content will be injected by JavaScript -->
                </div>
                <div class="hero-image">
                    <!-- 
                        IMPORTANT: Place your profile image here
                        1. Save your profile photo as 'profile.png' or 'profile.jpg'
                        2. Place it in the same directory as this HTML file
                        3. Update the src attribute in script.js (profileData.image)
                        
                        Recommended image specifications:
                        - Square aspect ratio (1:1) - e.g., 800x800px
                        - High quality (at least 600x600px)
                        - Face clearly visible
                        - Professional or semi-professional photo
                        - PNG or JPG format
                    -->
                    <div class="profile-image-container">
                        <img id="profileImage" src="" alt="Profile" class="profile-image">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section class="skills" id="skills">
        <div class="section-container">
            <h2 class="section-title">Skills & Expertise</h2>
            <div class="skills-grid" id="skillsGrid">
                <!-- Skills will be injected by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section class="projects" id="projects">
        <div class="section-container">
            <h2 class="section-title">Featured Projects</h2>
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be injected by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact" id="contact">
        <div class="section-container">
            <div class="contact-content">
                <h2 class="section-title">Let's Work Together</h2>
                <p class="contact-description">I'm always interested in hearing about new projects and opportunities.</p>
                <div class="contact-links" id="contactLinks">
                    <!-- Contact links will be injected by JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; <span id="currentYear"></span> Derick Juma. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
